<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Password Generator</title>
</head>
<body>
	<h1>Random / Memorable Password Generator</h1>
	
	<h2>Memorable Password Generator</h2>
	<button onclick="generatePassword()">Generate</button>
	<input type="text" id="rand_gen" readonly>

	<br>

	<h2>Random Password Generator</h2>
	<input type="text" id="word1" placeholder="First word">
	<input type="text" id="word2" placeholder="Second word">
	<input type="text" id="word3" placeholder="Third word">

	<br><br>
	<button onclick="generateMemorablePassword()">Generate</button>
	<input type="text" id="mem_gen" readonly>

	<script>
		const RANDOM_BYTE_RANGE = 32;
		const HASH_ITERATION_COUNT = 500000;

		async function generatePassword() {
			const ingredient = crypto.getRandomValues(new Uint8Array(RANDOM_BYTE_RANGE));
			const salt = crypto.getRandomValues(new Uint8Array(RANDOM_BYTE_RANGE));

			const keyMaterial = await crypto.subtle.importKey(
				"raw",
				ingredient,
				{ name: "PBKDF2" },
				false,
				["deriveBits"]
			);

			const derivedBits = await crypto.subtle.deriveBits(
				{
					name: "PBKDF2",
					salt: salt,
					iterations: HASH_ITERATION_COUNT,
					hash: "SHA-256"
				},
				keyMaterial,
				256
			);

			const hashArray = Array.from(new Uint8Array(derivedBits));
			const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

			document.getElementById("rand_gen").value = hashHex;
		}

		const DELIMITERS = ['-', '~', '!', ',', '$'];

		const LEET_MAP = {
			'a': '4',
			'e': '3',
			'i': '1',
			'o': '0',
			's': '5',
			't': '7'
		};

		function numericizePhrase(phrase) {
			let result = "";

			for (let char of phrase) {
				if (LEET_MAP[char.toLowerCase()]) {
					result += LEET_MAP[char.toLowerCase()];
				} else {
					result += char;
				}
			}

			return result;
		}

		function formatPassword(phrases) {
			let result = "";

			for (let i = 0; i < phrases.length; i++) {

				let currentPhrase = numericizePhrase(phrases[i]);
				result += currentPhrase;

				if (i !== phrases.length - 1) {
					let delimiter = DELIMITERS[Math.floor(Math.random() * DELIMITERS.length)];
					result += delimiter;
				}
			}

			return result;
		}

		function generateMemorablePassword() {
			const word1 = document.getElementById("word1").value;
			const word2 = document.getElementById("word2").value;
			const word3 = document.getElementById("word3").value;

			const memorableWords = [word1, word2, word3];

			const formattedPassword = formatPassword(memorableWords);

			document.getElementById("mem_gen").value = formattedPassword;
		}
	</script>
</body>
</html>
